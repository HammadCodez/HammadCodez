<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" font-family="ConsolasFallback,Consolas,monospace" width="1020px" height="530px" viewBox="0 0 1020 530" font-size="16px">
<style>
@font-face {
src: local('Consolas'), local('Consolas Bold');
font-family: 'ConsolasFallback';
font-display: swap;
-webkit-size-adjust: 109%;
size-adjust: 109%;
}
.key {fill: #a3a3a3;}
.value {fill: #ffffff;}
.addColor {fill: #10b981;}
.delColor {fill: #ef4444;}
.cc {fill: #262626;}
text, tspan {white-space: pre;}
</style>
<rect width="1020px" height="530px" fill="#000000" rx="15" stroke="#262626" stroke-width="1.5"/>

<!-- Window control buttons -->
<circle cx="25" cy="20" r="6" fill="#ff5f56"/>
<circle cx="45" cy="20" r="6" fill="#ffbd2e"/>
<circle cx="65" cy="20" r="6" fill="#27c93f"/>

<!-- Terminal Header -->
<text x="440" y="25" fill="#737373" font-size="14px" font-weight="bold">bash - hammad@codez</text>

<!-- Glow Filters -->
<filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
  <feGaussianBlur stdDeviation="3" result="blur"/>
  <feMerge>
    <feMergeNode in="blur"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>
<filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
  <feGaussianBlur stdDeviation="3" result="blur"/>
  <feMerge>
    <feMergeNode in="blur"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

<!-- Column 1: System Info (Left) -->
<rect x="25" y="55" width="310" height="450" fill="#000000" rx="10" stroke="#262626" stroke-width="1"/>
<text x="45" y="90" fill="#ffffff" font-weight="bold" font-size="15px">&gt; SYSTEM INFO</text>

<text x="45" y="130" fill="#ffffff" font-size="13px">
<tspan class="key">OS</tspan>        <tspan class="cc">::</tspan> <tspan class="value">Windows 11, Ubuntu, Arch</tspan>
<tspan x="45" y="165" class="key">Host</tspan>      <tspan class="cc">::</tspan> <tspan class="value">NUST / NSTP Hatch 8</tspan>
<tspan x="45" y="200" class="key">Role</tspan>      <tspan class="cc">::</tspan> <tspan class="value">Software Engineer &amp; Founder</tspan>
<tspan x="45" y="235" class="key">Motto</tspan>     <tspan class="cc">::</tspan> <tspan fill="#00dfeb" font-weight="bold">i build therefore i am</tspan>
<tspan x="45" y="270" class="key">Uptime</tspan>   <tspan class="cc">::</tspan> <tspan class="value" id="age_data">21 years, 4 months, 16 days</tspan>
<tspan x="45" y="325" fill="#737373" font-weight="bold">&gt; CONTACT</tspan>
<tspan x="45" y="365" class="key">Email</tspan>     <tspan class="cc">::</tspan> <tspan class="value">hammadbutt.mail@gmail.com</tspan>
<tspan x="45" y="400" class="key">LinkedIn</tspan>  <tspan class="cc">::</tspan> <tspan class="value">Muhammad Hammad Butt</tspan>
</text>
<!-- Hidden dots to prevent script crash if it searches for dots -->
<text x="0" y="0" fill="none" display="none">
<tspan id="age_data_dots"></tspan>
<tspan id="repo_data_dots"> .... </tspan>
<tspan id="star_data_dots"> ............. </tspan>
<tspan id="commit_data_dots"> ................... </tspan>
<tspan id="follower_data_dots"> ......... </tspan>
<tspan id="loc_data_dots">. </tspan>
<tspan id="loc_del_dots"></tspan>
</text>

<!-- Column 2: GitHub Stats (Middle) -->
<rect x="355" y="55" width="310" height="450" fill="#000000" rx="10" stroke="#262626" stroke-width="1"/>
<text x="375" y="90" fill="#ffffff" font-weight="bold" font-size="15px">&gt; GITHUB ANALYTICS</text>

<!-- Metric Block 1: Commits -->
<rect x="375" y="115" width="270" height="85" fill="#000000" rx="8" stroke="#262626" stroke-width="1"/>
<text x="390" y="138" fill="#a3a3a3" font-size="11px" font-weight="bold">TOTAL COMMITS</text>
<text x="390" y="180" fill="#10b981" font-size="32px" font-weight="bold" id="commit_data" filter="url(#glow-green)">333</text>

<!-- Metric Block 2: LOC -->
<rect x="375" y="215" width="270" height="105" fill="#000000" rx="8" stroke="#262626" stroke-width="1"/>
<text x="390" y="238" fill="#a3a3a3" font-size="11px" font-weight="bold">LINES OF CODE</text>
<text x="390" y="278" fill="#00dfeb" font-size="26px" font-weight="bold" id="loc_data" filter="url(#glow-cyan)">906,774</text>
<text x="390" y="303" font-size="12px"><tspan fill="#10b981" id="loc_add">1,212,845</tspan><tspan fill="#10b981">++</tspan><tspan fill="#404040"> / </tspan><tspan fill="#ef4444" id="loc_del">306,071</tspan><tspan fill="#ef4444">--</tspan></text>

<!-- Metric Block 3: Repos, Stars, Followers -->
<rect x="375" y="335" width="270" height="155" fill="#000000" rx="8" stroke="#262626" stroke-width="1"/>
<text x="390" y="360" fill="#a3a3a3" font-size="11px" font-weight="bold">REPOSITORIES</text>
<text x="390" y="382" fill="#ffffff" font-size="14px" font-weight="bold"><tspan id="repo_data">43</tspan> <tspan fill="#737373" font-weight="normal">(contrib: </tspan><tspan id="contrib_data" fill="#ffffff">47</tspan><tspan fill="#737373" font-weight="normal">)</tspan></text>

<text x="390" y="425" fill="#a3a3a3" font-size="11px" font-weight="bold">STARS</text>
<text x="390" y="447" fill="#ffffff" font-size="14px" font-weight="bold" id="star_data">0</text>

<text x="510" y="425" fill="#a3a3a3" font-size="11px" font-weight="bold">FOLLOWERS</text>
<text x="510" y="447" fill="#ffffff" font-size="14px" font-weight="bold" id="follower_data">4</text>

<!-- Column 3: Bio & Philosophy (Right) -->
<rect x="685" y="55" width="310" height="450" fill="#000000" rx="10" stroke="#262626" stroke-width="1"/>
<text x="705" y="90" fill="#ffffff" font-weight="bold" font-size="15px">&gt; BIO &amp; PHILOSOPHY</text>

<!-- Bio Section -->
<rect x="705" y="115" width="270" height="150" fill="#000000" rx="8" stroke="#262626" stroke-width="1"/>
<text x="720" y="138" fill="#a3a3a3" font-size="11px" font-weight="bold">FOUNDER @ FLOWDOC</text>
<text x="720" y="168" fill="#ffffff" font-size="12px" font-style="italic">"A founder who only codes</text>
<text x="720" y="188" fill="#ffffff" font-size="12px" font-style="italic"> isn't a founder yet."</text>
<text x="720" y="218" fill="#a3a3a3" font-size="11px">I build scalable, practical,</text>
<text x="720" y="235" fill="#a3a3a3" font-size="11px">user-focused products.</text>

<!-- Motto Section -->
<rect x="705" y="280" width="270" height="95" fill="#000000" rx="8" stroke="#262626" stroke-width="1"/>
<text x="720" y="303" fill="#a3a3a3" font-size="11px" font-weight="bold">CORE SYSTEM</text>
<text x="720" y="328" fill="#ffffff" font-size="12px" font-weight="bold">Progress is a daily system.</text>
<text x="720" y="350" fill="#10b981" font-size="11px">&gt; consistency, discipline, faith</text>

<!-- Stack Section -->
<rect x="705" y="390" width="270" height="100" fill="#000000" rx="8" stroke="#262626" stroke-width="1"/>
<text x="720" y="413" fill="#a3a3a3" font-size="11px" font-weight="bold">TECH STACK</text>
<text x="720" y="438" fill="#ffffff" font-size="11px">React, Next.js, Node, Express,</text>
<text x="720" y="458" fill="#ffffff" font-size="11px">Postgres, Prisma, Docker, Redis,</text>
<text x="720" y="478" fill="#ffffff" font-size="11px">Tailwind, Git, WordPress</text>

</svg>